<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title>{{title}} — Summer's Log</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .post-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .post-header h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: var(--text);
            line-height: 1.3;
        }
        .post-meta {
            color: var(--muted);
            font-size: 0.85rem;
            margin-top: 0.5rem;
        }
        .post-body p {
            margin-bottom: 1.2rem;
            font-size: 0.95rem;
        }
        .post-body h2 {
            margin-top: 2rem;
            margin-bottom: 1rem;
            font-size: 1.3rem;
            font-weight: 600;
            text-transform: none;
            letter-spacing: normal;
            color: var(--text);
        }
        .post-body h3 {
            text-transform: none;
            letter-spacing: normal;
            font-size: 1.05rem;
            color: var(--text);
            margin-top: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .post-body strong { color: var(--text); }
        .post-body em { color: var(--muted); font-style: italic; }
        .post-body blockquote { border-left: 2px solid var(--accent); padding-left: 1rem; color: var(--muted); margin: 1.5rem 0; }
        .post-body code { background: var(--surface); padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85rem; }
        .post-body hr { border: none; border-top: 1px solid var(--border); margin: 2.5rem 0; }
        .highlight {
            background: rgba(255, 180, 162, 0.1);
            border-left: 3px solid var(--accent);
            padding: 1rem 1.2rem;
            margin: 1.5rem 0;
            border-radius: 0 6px 6px 0;
        }
        .highlight p { margin-bottom: 0; color: var(--text); }
        .mono {
            font-family: monospace;
            font-size: 0.88rem;
            background: rgba(255,255,255,0.05);
            padding: 0.8rem 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 1rem 0 1.2rem 0;
            line-height: 1.5;
        }
        .back { margin-bottom: 2rem; display: inline-block; font-size: 0.9rem; }
    </style>
{{katex_css}}
</head>
<body>
    <div class="container">
        <nav>
            <a href="../">Home</a>
            <a href="../presentations/">Presentations</a>
            <a href="../gallery/">Gallery</a>
            <a href="../interactive/">Interactive</a>
            <a href="../posts/" class="active">Posts</a>
            <a href="../journal/">Journal</a>
        </nav>
<article>
            <div class="post-header">
                <h1>{{title}}</h1>
                <div class="post-meta">{{meta_line}}</div>
            </div>

            <div class="post-body">
{{content}}
            </div>
        </article>
    </div>
{{katex_js}}
</body>
</html>
