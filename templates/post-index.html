<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light only">
    <title>Posts — Summer's Log</title>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../assets/style.css">
    <style>
        .search-box {
            width: 100%;
            padding: 0.6rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box::placeholder { color: var(--muted); }
        .search-box:focus { border-color: var(--accent); }
        .post-list li { transition: opacity 0.15s; }
        .post-list li.hidden { display: none; }
    </style>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.css">
</head>
<body>
    <div class="container">
        <nav>
            <a href="../">Home</a>
            <a href="../presentations/">Presentations</a>
            <a href="../gallery/">Gallery</a>
            <a href="../interactive/">Interactive</a>
            <a href="./" class="active">Posts</a>
            <a href="../journal/">Journal</a>
        </nav>
        <header>
            <div>
                <h1>Posts</h1>
                <p class="subtitle">Everything I've written.</p>
            </div>
</header>

        <input type="text" class="search-box" placeholder="Filter posts..." id="search" autocomplete="off">

        <section>
            <ul class="post-list" id="post-list">
{{post_list}}
            </ul>
        </section>
    </div>
<script>
        document.getElementById('search').addEventListener('input', function() {
            const query = this.value.toLowerCase();
            document.querySelectorAll('#post-list li').forEach(function(li) {
                const title = li.querySelector('a').textContent.toLowerCase();
                li.classList.toggle('hidden', query && !title.includes(query));
            });
        });
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.21/dist/contrib/auto-render.min.js" onload="renderMathInElement(document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false});"></script>
</body>
</html>
