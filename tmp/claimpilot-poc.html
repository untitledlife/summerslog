<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClaimPilot — AI Claims Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #c2653a;
  --accent-light: #f3ddd3;
  --accent-hover: #a8522d;
  --bg: #f7f7f5;
  --surface: #ffffff;
  --surface-secondary: #f0efed;
  --border: #e5e4e1;
  --border-light: #eeede9;
  --text-primary: #1a1a1a;
  --text-secondary: #6b6b6b;
  --text-tertiary: #999;
  --green: #1a8c5e;
  --green-bg: #e6f5ee;
  --blue: #2563eb;
  --blue-bg: #e8f0fe;
  --amber: #d97706;
  --amber-bg: #fef3c7;
  --red: #dc2626;
  --red-bg: #fee2e2;
  --purple: #7c3aed;
  --purple-bg: #ede9fe;
  --radius: 10px;
  --radius-lg: 14px;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 24px rgba(0,0,0,0.1);
  --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text-primary);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}

/* ── Top Banner ── */
.top-banner {
  background: var(--text-primary);
  color: #fff;
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}

.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  font-weight: 700;
  font-size: 17px;
  letter-spacing: -0.3px;
}

.brand-icon {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  font-weight: 700;
}

.brand-sub {
  font-size: 11px;
  font-weight: 400;
  color: rgba(255,255,255,0.5);
  margin-left: 8px;
}

.role-switcher {
  display: flex;
  align-items: center;
  gap: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 8px;
  padding: 3px;
}

.role-btn {
  padding: 7px 16px;
  border: none;
  background: transparent;
  color: rgba(255,255,255,0.6);
  font-family: var(--font);
  font-size: 13px;
  font-weight: 500;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s ease;
  white-space: nowrap;
}

.role-btn:hover {
  color: rgba(255,255,255,0.85);
  background: rgba(255,255,255,0.06);
}

.role-btn.active {
  background: var(--accent);
  color: #fff;
}

.banner-right {
  display: flex;
  align-items: center;
  gap: 16px;
}

.powered-by {
  font-size: 11px;
  color: rgba(255,255,255,0.35);
}

.powered-by a {
  color: rgba(255,255,255,0.55);
  text-decoration: none;
}

/* ── Views Container ── */
.view { display: none; }
.view.active { display: block; }

/* ═══════════════════════════════════════
   VIEW 1: CLAIMANT (CHAT)
   ═══════════════════════════════════════ */
.chat-container {
  max-width: 520px;
  margin: 0 auto;
  height: calc(100vh - 56px);
  display: flex;
  flex-direction: column;
  background: var(--surface);
  border-left: 1px solid var(--border);
  border-right: 1px solid var(--border);
}

.chat-header {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface);
  flex-shrink: 0;
}

.chat-header-avatar {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: var(--accent-light);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.chat-header-info h3 {
  font-size: 14px;
  font-weight: 600;
}

.chat-header-info p {
  font-size: 12px;
  color: var(--text-secondary);
}

.claim-tabs {
  display: flex;
  gap: 0;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  overflow-x: auto;
}

.claim-tab {
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 500;
  color: var(--text-secondary);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  font-family: var(--font);
  white-space: nowrap;
  transition: all 0.15s;
}

.claim-tab:hover { color: var(--text-primary); }

.claim-tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  background: var(--surface-secondary);
}

.chat-date-divider {
  text-align: center;
  font-size: 11px;
  color: var(--text-tertiary);
  padding: 8px 0;
}

.chat-date-divider span {
  background: rgba(0,0,0,0.06);
  padding: 3px 10px;
  border-radius: 10px;
}

.msg {
  max-width: 82%;
  padding: 9px 12px;
  border-radius: 12px;
  font-size: 13.5px;
  line-height: 1.45;
  position: relative;
}

.msg-time {
  font-size: 10px;
  color: rgba(0,0,0,0.35);
  margin-top: 3px;
  text-align: right;
}

.msg.user {
  align-self: flex-end;
  background: #dcf8c6;
  border-bottom-right-radius: 4px;
}

.msg.agent {
  align-self: flex-start;
  background: var(--surface);
  border-bottom-left-radius: 4px;
  box-shadow: var(--shadow-sm);
}

.msg.system {
  align-self: center;
  background: var(--blue-bg);
  color: var(--blue);
  font-size: 12px;
  font-weight: 500;
  border-radius: 8px;
  padding: 8px 14px;
  max-width: 90%;
  text-align: center;
}

.msg.system.success {
  background: var(--green-bg);
  color: var(--green);
}

/* Voice note */
.voice-note {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 180px;
}

.voice-play {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: #fff;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.voice-waveform {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 1.5px;
  height: 28px;
}

.voice-waveform .bar {
  width: 3px;
  background: rgba(0,0,0,0.25);
  border-radius: 2px;
  flex-shrink: 0;
}

.voice-duration {
  font-size: 11px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

/* Photo message */
.msg-photo {
  width: 200px;
  height: 150px;
  background: var(--surface-secondary);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 4px;
  overflow: hidden;
  position: relative;
}

.msg-photo .photo-icon {
  font-size: 32px;
  opacity: 0.4;
}

.msg-photo .photo-label {
  position: absolute;
  bottom: 6px;
  left: 8px;
  font-size: 10px;
  color: var(--text-secondary);
  background: rgba(255,255,255,0.85);
  padding: 2px 6px;
  border-radius: 4px;
}

/* Document attachment */
.msg-doc {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 12px;
  background: var(--surface-secondary);
  border-radius: 8px;
  margin-bottom: 4px;
  cursor: pointer;
}

.msg-doc-icon {
  width: 36px;
  height: 36px;
  background: var(--red);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 12px;
  font-weight: 700;
  flex-shrink: 0;
}

.msg-doc-info {
  flex: 1;
  min-width: 0;
}

.msg-doc-name {
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.msg-doc-size {
  font-size: 10px;
  color: var(--text-secondary);
}

/* Chat input */
.chat-input-area {
  padding: 10px 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--surface);
  flex-shrink: 0;
}

.chat-input {
  flex: 1;
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 9px 16px;
  font-size: 13px;
  font-family: var(--font);
  outline: none;
  transition: border-color 0.15s;
}

.chat-input:focus { border-color: var(--accent); }

.chat-input::placeholder { color: var(--text-tertiary); }

.chat-send, .chat-mic {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  transition: background 0.15s;
  flex-shrink: 0;
}

.chat-send {
  background: var(--accent);
  color: #fff;
}

.chat-send:hover { background: var(--accent-hover); }

.chat-mic {
  background: var(--surface-secondary);
  color: var(--text-secondary);
}

.chat-mic:hover { background: var(--border); }

/* ═══════════════════════════════════════
   VIEW 2: OPERATIONS
   ═══════════════════════════════════════ */
.ops-layout {
  display: grid;
  grid-template-columns: 320px 1fr;
  height: calc(100vh - 56px);
}

.ops-sidebar {
  border-right: 1px solid var(--border);
  background: var(--surface);
  overflow-y: auto;
}

.ops-sidebar-header {
  padding: 18px 18px 12px;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border-light);
}

.ops-claim-item {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border-light);
  cursor: pointer;
  transition: background 0.1s;
}

.ops-claim-item:hover { background: var(--surface-secondary); }
.ops-claim-item.active { background: var(--accent-light); border-right: 3px solid var(--accent); }

.ops-claim-item-top {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 4px;
}

.ops-claim-vehicle {
  font-size: 13px;
  font-weight: 600;
  line-height: 1.3;
}

.ops-claim-reg {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 1px;
}

.ops-claim-owner {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.ops-claim-bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 6px;
}

.ops-claim-amount {
  font-size: 12px;
  font-weight: 600;
}

.status-badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 10px;
  white-space: nowrap;
}

.status-new { background: var(--amber-bg); color: var(--amber); }
.status-progress { background: var(--blue-bg); color: var(--blue); }
.status-near { background: var(--green-bg); color: var(--green); }
.status-resolved { background: var(--surface-secondary); color: var(--text-secondary); }

/* Ops Main */
.ops-main {
  overflow-y: auto;
  padding: 24px;
  background: var(--bg);
}

.ops-section {
  margin-bottom: 24px;
}

.ops-section-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
}

/* Claim summary card */
.claim-summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow);
}

.claim-summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 16px;
}

.claim-summary-field label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  display: block;
  margin-bottom: 3px;
}

.claim-summary-field .value {
  font-size: 13px;
  font-weight: 500;
}

.claim-summary-field .value.highlight {
  color: var(--accent);
  font-weight: 600;
}

.claim-summary-incident {
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border-light);
}

.claim-summary-incident label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  display: block;
  margin-bottom: 3px;
}

.claim-summary-incident p {
  font-size: 13px;
  color: var(--text-primary);
  line-height: 1.5;
}

/* Doc checklist */
.doc-checklist {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.doc-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 11px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border-light);
}

.doc-item:last-child { border-bottom: none; }

.doc-status {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
}

.doc-status.done { background: var(--green-bg); color: var(--green); }
.doc-status.pending { background: var(--amber-bg); color: var(--amber); }
.doc-status.missing { background: var(--red-bg); color: var(--red); }

.doc-name { flex: 1; font-weight: 500; }
.doc-note { font-size: 11px; color: var(--text-tertiary); }

/* Timeline */
.timeline {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  box-shadow: var(--shadow);
}

.timeline-item {
  display: flex;
  gap: 14px;
  padding-bottom: 14px;
  position: relative;
}

.timeline-item:last-child { padding-bottom: 0; }

.timeline-dot-col {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 12px;
  flex-shrink: 0;
}

.timeline-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  margin-top: 4px;
}

.timeline-dot.inactive { background: var(--border); }

.timeline-line {
  width: 2px;
  flex: 1;
  background: var(--border-light);
  margin-top: 4px;
}

.timeline-content {
  flex: 1;
  min-width: 0;
}

.timeline-event {
  font-size: 13px;
  font-weight: 500;
}

.timeline-meta {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 1px;
}

/* Deadline tracker */
.deadline-tracker {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.deadline-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 16px;
  font-size: 13px;
  border-bottom: 1px solid var(--border-light);
}

.deadline-item:last-child { border-bottom: none; }

.deadline-label { font-weight: 500; flex: 1; }

.deadline-date { font-size: 12px; color: var(--text-secondary); margin-right: 10px; }

.deadline-status {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 8px;
}

.deadline-green { background: var(--green-bg); color: var(--green); }
.deadline-amber { background: var(--amber-bg); color: var(--amber); }
.deadline-red { background: var(--red-bg); color: var(--red); }

/* Integration log */
.integration-log {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.integration-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 16px;
  font-size: 12px;
  border-bottom: 1px solid var(--border-light);
}

.integration-item:last-child { border-bottom: none; }

.integration-icon {
  width: 24px;
  height: 24px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  flex-shrink: 0;
  margin-top: 1px;
}

.integration-icon.crm { background: var(--purple-bg); color: var(--purple); }
.integration-icon.loan { background: var(--blue-bg); color: var(--blue); }
.integration-icon.acct { background: var(--green-bg); color: var(--green); }
.integration-icon.gate { background: var(--amber-bg); color: var(--amber); }

.integration-text { flex: 1; line-height: 1.4; color: var(--text-primary); }
.integration-time { font-size: 10px; color: var(--text-tertiary); flex-shrink: 0; white-space: nowrap; margin-top: 2px; }

/* Agent reasoning */
.reasoning-log {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow);
}

.reasoning-item {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border-light);
}

.reasoning-item:last-child { border-bottom: none; }

.reasoning-decision {
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 3px;
}

.reasoning-why {
  font-size: 12px;
  color: var(--text-secondary);
  line-height: 1.45;
}

/* Two column layout for ops */
.ops-two-col {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
}

/* ═══════════════════════════════════════
   VIEW 3: MANAGEMENT
   ═══════════════════════════════════════ */
.mgmt-container {
  max-width: 1100px;
  margin: 0 auto;
  padding: 24px;
}

.mgmt-header {
  margin-bottom: 24px;
}

.mgmt-header h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.mgmt-header p {
  font-size: 13px;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Summary cards */
.summary-cards {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 24px;
}

.summary-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 18px;
  box-shadow: var(--shadow);
}

.summary-card-label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.4px;
  font-weight: 500;
}

.summary-card-value {
  font-size: 28px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-top: 4px;
}

.summary-card-sub {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

.summary-card-value.accent { color: var(--accent); }

/* Mgmt grid */
.mgmt-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
  margin-bottom: 24px;
}

.mgmt-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  box-shadow: var(--shadow);
}

.mgmt-card-title {
  font-size: 14px;
  font-weight: 600;
  margin-bottom: 16px;
}

/* Status breakdown */
.status-breakdown {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.status-row-label {
  font-size: 13px;
  width: 120px;
  flex-shrink: 0;
}

.status-bar-track {
  flex: 1;
  height: 24px;
  background: var(--surface-secondary);
  border-radius: 6px;
  overflow: hidden;
}

.status-bar-fill {
  height: 100%;
  border-radius: 6px;
  display: flex;
  align-items: center;
  padding-left: 8px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  transition: width 0.5s ease;
}

.status-bar-fill.new { background: var(--amber); }
.status-bar-fill.progress { background: var(--blue); }
.status-bar-fill.near { background: var(--green); }
.status-bar-fill.resolved { background: var(--text-secondary); }

.status-row-count {
  font-size: 13px;
  font-weight: 600;
  width: 20px;
  text-align: right;
}

/* Fleet risk */
.fleet-risk-table {
  width: 100%;
  border-collapse: collapse;
}

.fleet-risk-table th {
  text-align: left;
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  padding: 0 0 10px;
  border-bottom: 1px solid var(--border-light);
  font-weight: 500;
}

.fleet-risk-table td {
  padding: 10px 0;
  font-size: 13px;
  border-bottom: 1px solid var(--border-light);
}

.fleet-risk-table tr:last-child td { border-bottom: none; }

/* Bar chart CSS-only */
.bar-chart {
  display: flex;
  align-items: flex-end;
  gap: 12px;
  height: 160px;
  padding-top: 10px;
}

.bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  height: 100%;
  justify-content: flex-end;
}

.bar-value {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-secondary);
  margin-bottom: 4px;
}

.bar-rect {
  width: 100%;
  max-width: 48px;
  border-radius: 5px 5px 0 0;
  transition: height 0.5s ease;
}

.bar-label {
  font-size: 11px;
  color: var(--text-tertiary);
  margin-top: 6px;
  text-align: center;
}

/* Cost summary */
.cost-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.cost-item {
  padding: 12px;
  background: var(--surface-secondary);
  border-radius: var(--radius);
}

.cost-item label {
  font-size: 11px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.3px;
  display: block;
}

.cost-item .cost-val {
  font-size: 20px;
  font-weight: 700;
  margin-top: 2px;
}

.cost-item .cost-note {
  font-size: 11px;
  color: var(--text-secondary);
  margin-top: 1px;
}

/* SLA Compliance */
.sla-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.sla-item {
  text-align: center;
  padding: 14px;
  background: var(--surface-secondary);
  border-radius: var(--radius);
}

.sla-pct {
  font-size: 32px;
  font-weight: 700;
}

.sla-pct.green { color: var(--green); }
.sla-pct.amber { color: var(--amber); }

.sla-label {
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 2px;
}

/* Full width mgmt card */
.mgmt-full {
  margin-bottom: 24px;
}

/* ── Scrollbar styling ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

/* ── Responsive ── */
@media (max-width: 900px) {
  .ops-layout { grid-template-columns: 1fr; }
  .ops-sidebar { max-height: 200px; }
  .summary-cards { grid-template-columns: repeat(2, 1fr); }
  .mgmt-grid { grid-template-columns: 1fr; }
  .ops-two-col { grid-template-columns: 1fr; }
  .claim-summary-grid { grid-template-columns: 1fr 1fr; }
}

@media (max-width: 600px) {
  .role-switcher { display: none; }
  .summary-cards { grid-template-columns: 1fr; }
}

function generateWaveformBars() {
  const heights = [];
  for (let i = 0; i < 28; i++) {
    heights.push(4 + Math.floor(Math.random() * 20));
  }
  return heights;
}

function renderVoiceNote(duration) {
  const bars = generateWaveformBars();
  return `<div class="voice-note">
    <button class="voice-play">▶</button>
    <div class="voice-waveform">${bars.map(h => `<div class="bar" style="height:${h}px"></div>`).join("")}</div>
    <span class="voice-duration">${duration}</span>
  </div>`;
}

function renderPhotoMessage(label, count) {
  if (count && count > 1) {
    return `<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;">
      ${Array.from({length: Math.min(count, 4)}, (_, i) => `<div class="msg-photo" style="width:100%;height:80px;">
        <span class="photo-icon">📷</span>
        ${i === 3 && count > 4 ? `<div style="position:absolute;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:16px;border-radius:8px;">+${count - 4}</div>` : ""}
      </div>`).join("")}
    </div>
    <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">${label} — ${count} photos</div>`;
  }
  return `<div class="msg-photo">
    <span class="photo-icon">📷</span>
    <span class="photo-label">${label}</span>
  </div>`;
}

function renderChat(claimId) {
  selectedChatClaim = claimId;
  const messages = CHAT_DATA[claimId] || [];
  const container = document.getElementById("chatMessages");
  container.innerHTML = "";

  messages.forEach(msg => {
    if (msg.type === "date") {
      const div = document.createElement("div");
      div.className = "chat-date-divider";
      div.innerHTML = `<span>${msg.text}</span>`;
      container.appendChild(div);
      return;
    }

    if (msg.type === "system") {
      const div = document.createElement("div");
      div.className = "msg system" + (msg.variant === "success" ? " success" : "");
      div.innerHTML = `${msg.text}<div class="msg-time">${msg.time}</div>`;
      container.appendChild(div);
      return;
    }

    const div = document.createElement("div");
    div.className = `msg ${msg.type}`;

    let content = "";
    if (msg.format === "voice") {
      content = renderVoiceNote(msg.duration);
    } else if (msg.format === "photos") {
      content = renderPhotoMessage(msg.label, msg.count);
    } else if (msg.format === "photo") {
      content = renderPhotoMessage(msg.label);
    } else if (msg.format === "doc") {
      content = `<div class="msg-doc">
        <div class="msg-doc-icon">PDF</div>
        <div class="msg-doc-info">
          <div class="msg-doc-name">${msg.docName}</div>
          <div class="msg-doc-size">${msg.docSize}</div>
        </div>
      </div>`;
    } else {
      content = msg.text.replace(/\n/g, "<br>");
    }

    div.innerHTML = content + `<div class="msg-time">${msg.time}</div>`;
    container.appendChild(div);
  });

  container.scrollTop = container.scrollHeight;

  // Update tabs
  document.querySelectorAll(".claim-tab").forEach(t => {
    t.classList.toggle("active", t.dataset.claim === claimId);
  });
}

function initClaimantView() {
  const tabsEl = document.getElementById("claimTabs");
  tabsEl.innerHTML = CLAIMS.map(c =>
    `<button class="claim-tab${c.id === selectedChatClaim ? " active" : ""}" data-claim="${c.id}">${c.vehicle.split(" ")[0]} ${c.reg.slice(-4)}</button>`
  ).join("");

  tabsEl.querySelectorAll(".claim-tab").forEach(tab => {
    tab.addEventListener("click", () => renderChat(tab.dataset.claim));
  });

  renderChat(selectedChatClaim);
}
