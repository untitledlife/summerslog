<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Epicycle Alchemy — Fourier Series Drawer</title>
<link rel="icon" href="../assets/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111;
    --bg2: #1a1a1a;
    --bg3: #252525;
    --fg: #eee;
    --fg2: #aaa;
    --accent: #ffb4a2;
    --accent2: #e8998d;
    --circle: rgba(255,180,162,0.22);
    --trace: #ffb4a2;
    --drawn: #666;
    --radius: 6px;
  }
  [data-theme="light"] {
    --bg: #f5f5f0;
    --bg2: #eaeae5;
    --bg3: #ddddd8;
    --fg: #222;
    --fg2: #666;
    --accent: #c2653a;
    --accent2: #a85330;
    --circle: rgba(194,101,58,0.18);
    --trace: #c2653a;
    --drawn: #aaa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--fg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    transition: background 0.3s, color 0.3s;
  }

  /* NAV */
  nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--bg3);
    background: var(--bg2);
    flex-shrink: 0;
    z-index: 10;
  }
  nav .links { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  nav a {
    color: var(--fg2);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: color 0.2s;
  }
  nav a:hover, nav a.active { color: var(--accent); }
  .theme-toggle {
    background: none;
    border: 1px solid var(--bg3);
    color: var(--fg2);
    cursor: pointer;
    padding: 6px 10px;
    border-radius: var(--radius);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    transition: all 0.2s;
  }
  .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

  /* HEADER */
  header {
    text-align: center;
    padding: 20px 16px 6px;
    flex-shrink: 0;
  }
  header h1 {
    font-size: clamp(20px, 3.5vw, 28px);
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
  }
  header p {
    color: var(--fg2);
    font-size: 13px;
    margin-top: 4px;
    max-width: 560px;
    margin-inline: auto;
    line-height: 1.5;
  }

  /* MAIN */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 12px 16px;
    gap: 10px;
    min-height: 0;
  }

  /* CANVAS */
  .canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 800px;
    aspect-ratio: 4/3;
    max-height: 58vh;
    border-radius: var(--radius);
    overflow: hidden;
    border: 1px solid var(--bg3);
    background: var(--bg);
    flex-shrink: 0;
  }
  .canvas-wrap canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    cursor: crosshair;
  }
  .canvas-hint {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: var(--fg2);
    font-size: 14px;
    pointer-events: none;
    text-align: center;
    line-height: 1.6;
    opacity: 0.6;
    transition: opacity 0.3s;
  }
  .canvas-hint.hidden { opacity: 0; }

  /* CONTOUR PREVIEW */
  .contour-preview {
    position: absolute;
    bottom: 8px; right: 8px;
    width: 80px; height: 80px;
    border: 1px solid var(--bg3);
    border-radius: var(--radius);
    background: var(--bg2);
    display: none;
    overflow: hidden;
  }
  .contour-preview canvas {
    width: 100%; height: 100%;
    position: static;
    cursor: default;
  }

  /* CONTROLS */
  .controls {
    width: 100%;
    max-width: 800px;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .control-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--bg2);
    padding: 7px 12px;
    border-radius: var(--radius);
    border: 1px solid var(--bg3);
  }
  .control-group label {
    font-size: 11px;
    color: var(--fg2);
    white-space: nowrap;
    font-weight: 500;
  }
  .control-group .val {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    min-width: 28px;
    text-align: right;
    font-weight: 600;
  }
  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    width: 100px;
    height: 3px;
    background: var(--bg3);
    border-radius: 2px;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
  }
  button.btn {
    background: var(--bg2);
    color: var(--fg);
    border: 1px solid var(--bg3);
    padding: 7px 14px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  button.btn:hover { border-color: var(--accent); color: var(--accent); }
  button.btn.primary {
    background: var(--accent);
    color: #111;
    border-color: var(--accent);
    font-weight: 600;
  }
  button.btn.primary:hover { background: var(--accent2); border-color: var(--accent2); }

  /* FILE INPUT */
  .upload-label {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: var(--bg2);
    color: var(--fg);
    border: 1px solid var(--bg3);
    padding: 7px 14px;
    border-radius: var(--radius);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.2px;
  }
  .upload-label:hover { border-color: var(--accent); color: var(--accent); }
  .upload-label input { display: none; }

  /* PRESETS */
  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .presets button {
    font-size: 11px;
    padding: 5px 10px;
  }

  /* INFO */
  .info-bar {
    width: 100%;
    max-width: 800px;
    display: flex;
    justify-content: center;
    gap: 20px;
    font-size: 11px;
    color: var(--fg2);
    padding: 6px;
    flex-shrink: 0;
    font-family: 'JetBrains Mono', monospace;
  }
  .info-bar span strong { color: var(--accent); font-weight: 600; }

  /* MOBILE */
  @media (max-width: 600px) {
    nav { padding: 10px 14px; }
    nav .links { gap: 12px; }
    nav a { font-size: 12px; }
    header { padding: 14px 12px 4px; }
    .canvas-wrap { aspect-ratio: 1/1; max-height: 52vh; }
    input[type=range] { width: 70px; }
    .control-group { padding: 5px 8px; }
    .controls { gap: 6px; }
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .recording-dot {
    display: inline-block;
    width: 7px; height: 7px;
    background: #d44;
    border-radius: 50%;
    margin-right: 5px;
    animation: pulse 1s infinite;
  }
</style>
</head>
<body>

<nav>
  <div class="links">
    <a href="../">Home</a>
    <a href="../presentations/">Presentations</a>
    <a href="../gallery/">Gallery</a>
    <a href="./" class="active">Interactive</a>
    <a href="../posts/">Posts</a>
  </div>
  <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle theme">
    <span id="theme-icon">light</span>
  </button>
</nav>

<header>
  <h1>Epicycle Alchemy</h1>
  <p>Draw a shape or upload an image, then watch Fourier analysis decompose it into orbiting circles.</p>
</header>

<main>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
    <div class="canvas-hint" id="hint">
      Draw a shape here<br><span style="font-size:12px;opacity:0.5">click/touch and drag, then release</span>
    </div>
    <div class="contour-preview" id="contourPreview">
      <canvas id="previewCanvas" width="80" height="80"></canvas>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label>Harmonics</label>
      <input type="range" id="harmonics" min="1" max="200" value="50">
      <span class="val" id="harmonicsVal">50</span>
    </div>
    <div class="control-group">
      <label>Speed</label>
      <input type="range" id="speed" min="1" max="20" value="5">
      <span class="val" id="speedVal">5</span>
    </div>
    <div class="control-group">
      <label>Trail</label>
      <input type="range" id="trail" min="50" max="2000" value="800">
      <span class="val" id="trailVal">800</span>
    </div>
    <button class="btn primary" id="clearBtn">Clear &amp; Draw</button>
    <label class="upload-label">
      Upload Image
      <input type="file" id="imageUpload" accept="image/*">
    </label>
  </div>

  <div class="presets">
    <button class="btn" onclick="loadPreset('star')">Star</button>
    <button class="btn" onclick="loadPreset('heart')">Heart</button>
    <button class="btn" onclick="loadPreset('trefoil')">Trefoil</button>
    <button class="btn" onclick="loadPreset('square')">Square</button>
    <button class="btn" onclick="loadPreset('figure8')">Figure-8</button>
    <button class="btn" onclick="loadPreset('spiral')">Spiral</button>
    <button class="btn" onclick="loadPreset('butterfly')">Butterfly</button>
  </div>

  <div class="info-bar">
    <span>Circles: <strong id="infoCircles">0</strong></span>
    <span>Points: <strong id="infoPoints">0</strong></span>
    <span id="statusText">Ready to draw</span>
  </div>
</main>

<script>
// ==== Theme ====
function toggleTheme() {
  const html = document.documentElement;
  const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  document.getElementById('theme-icon').textContent = next === 'dark' ? 'light' : 'dark';
}

// ==== Single canvas setup ====
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const hint = document.getElementById('hint');

let W, H, dpr;

function resize() {
  const rect = canvas.parentElement.getBoundingClientRect();
  dpr = window.devicePixelRatio || 1;
  W = rect.width;
  H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Redraw current state
  if (fourierCoeffs.length && !animId) {
    drawStaticPath();
  }
}
window.addEventListener('resize', () => {
  resize();
  if (fourierCoeffs.length && animId) {
    // Animation loop will pick up new size
  }
});
resize();

// ==== State ====
let drawnPoints = [];
let isDrawing = false;
let fourierCoeffs = [];
let fullCoeffs = []; // precomputed at max harmonics for slicing
let fourierCenter = { x: 0, y: 0 };
let animTime = 0;
let tracePoints = [];
let animId = null;

// ==== Utility: get theme colors ====
function themeColors() {
  const s = getComputedStyle(document.documentElement);
  return {
    bg: s.getPropertyValue('--bg').trim(),
    accent: s.getPropertyValue('--accent').trim(),
    circle: s.getPropertyValue('--circle').trim(),
    trace: s.getPropertyValue('--trace').trim(),
    drawn: s.getPropertyValue('--drawn').trim(),
    fg2: s.getPropertyValue('--fg2').trim(),
  };
}

// ==== Drawing input ====
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top,
  };
}

function startDraw(e) {
  e.preventDefault();
  stopAnimation();
  drawnPoints = [];
  tracePoints = [];
  fourierCoeffs = [];
  fullCoeffs = [];
  isDrawing = true;
  hint.classList.add('hidden');
  hideContourPreview();
  ctx.clearRect(0, 0, W, H);
  const p = getPos(e);
  drawnPoints.push(p);
  setStatus('<span class="recording-dot"></span>Drawing...');
}

function moveDraw(e) {
  if (!isDrawing) return;
  e.preventDefault();
  const p = getPos(e);
  drawnPoints.push(p);
  // Redraw drawn path so far
  drawUserPath();
}

function endDraw(e) {
  if (!isDrawing) return;
  isDrawing = false;
  if (drawnPoints.length < 10) {
    hint.classList.remove('hidden');
    setStatus('Too few points -- try again');
    return;
  }
  processPoints(drawnPoints);
}

canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', (e) => { if (isDrawing) endDraw(e); });
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);

// ==== Draw the user's freehand path (no animation) ====
function drawUserPath() {
  const c = themeColors();
  ctx.clearRect(0, 0, W, H);
  if (drawnPoints.length < 2) return;
  ctx.strokeStyle = c.drawn;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(drawnPoints[0].x, drawnPoints[0].y);
  for (let i = 1; i < drawnPoints.length; i++) {
    ctx.lineTo(drawnPoints[i].x, drawnPoints[i].y);
  }
  ctx.stroke();
}

// ==== Draw static path (when not animating, show the original shape faintly) ====
function drawStaticPath() {
  const c = themeColors();
  ctx.clearRect(0, 0, W, H);
  if (drawnPoints.length < 2) return;
  ctx.strokeStyle = c.drawn;
  ctx.lineWidth = 1.5;
  ctx.globalAlpha = 0.3;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.beginPath();
  ctx.moveTo(drawnPoints[0].x, drawnPoints[0].y);
  for (let i = 1; i < drawnPoints.length; i++) {
    ctx.lineTo(drawnPoints[i].x, drawnPoints[i].y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.globalAlpha = 1;
}

// ==== Clear ====
document.getElementById('clearBtn').addEventListener('click', () => {
  stopAnimation();
  drawnPoints = [];
  tracePoints = [];
  fourierCoeffs = [];
  fullCoeffs = [];
  animTime = 0;
  ctx.clearRect(0, 0, W, H);
  hint.classList.remove('hidden');
  hideContourPreview();
  setStatus('Ready to draw');
  document.getElementById('infoCircles').textContent = '0';
  document.getElementById('infoPoints').textContent = '0';
});

// ==== DFT ====
function computeDFT(points, maxN) {
  const N = points.length;
  const coeffs = [];
  const freqs = [0];
  for (let i = 1; i <= Math.floor(N / 2); i++) {
    freqs.push(i);
    freqs.push(-i);
  }
  const limit = Math.min(freqs.length, maxN);
  for (let fi = 0; fi < limit; fi++) {
    const k = freqs[fi];
    let re = 0, im = 0;
    for (let n = 0; n < N; n++) {
      const angle = -2 * Math.PI * k * n / N;
      re += points[n].x * Math.cos(angle) - points[n].y * Math.sin(angle);
      im += points[n].x * Math.sin(angle) + points[n].y * Math.cos(angle);
    }
    re /= N;
    im /= N;
    coeffs.push({
      freq: k,
      amp: Math.sqrt(re * re + im * im),
      phase: Math.atan2(im, re),
    });
  }
  coeffs.sort((a, b) => b.amp - a.amp);
  return coeffs;
}

function resample(pts, n) {
  if (pts.length < 2) return pts;
  const dists = [0];
  for (let i = 1; i < pts.length; i++) {
    const dx = pts[i].x - pts[i - 1].x;
    const dy = pts[i].y - pts[i - 1].y;
    dists.push(dists[i - 1] + Math.sqrt(dx * dx + dy * dy));
  }
  const total = dists[dists.length - 1];
  if (total === 0) return pts.slice(0, n);
  const result = [];
  for (let i = 0; i < n; i++) {
    const target = (i / n) * total;
    let lo = 0, hi = dists.length - 1;
    while (lo < hi - 1) {
      const mid = (lo + hi) >> 1;
      if (dists[mid] < target) lo = mid; else hi = mid;
    }
    const seg = dists[hi] - dists[lo] || 1;
    const t = (target - dists[lo]) / seg;
    result.push({
      x: pts[lo].x + t * (pts[hi].x - pts[lo].x),
      y: pts[lo].y + t * (pts[hi].y - pts[lo].y),
    });
  }
  return result;
}

function processPoints(pts) {
  const resampled = resample(pts, 512);
  let cx = 0, cy = 0;
  for (const p of resampled) { cx += p.x; cy += p.y; }
  cx /= resampled.length;
  cy /= resampled.length;
  const centered = resampled.map(p => ({ x: p.x - cx, y: p.y - cy }));

  fourierCenter = { x: cx, y: cy };
  // Precompute at high harmonic count for real-time slider
  fullCoeffs = computeDFT(centered, 400);

  const maxN = parseInt(document.getElementById('harmonics').value);
  fourierCoeffs = fullCoeffs.slice(0, maxN);

  document.getElementById('infoPoints').textContent = resampled.length;
  document.getElementById('infoCircles').textContent = fourierCoeffs.length;

  animTime = 0;
  tracePoints = [];
  startAnimation();
  setStatus('Animating');
}

// ==== Animation ====
function stopAnimation() {
  if (animId) {
    cancelAnimationFrame(animId);
    animId = null;
  }
}

function startAnimation() {
  stopAnimation();
  animTime = 0;
  tracePoints = [];
  animate();
}

function animate() {
  const c = themeColors();
  const maxN = parseInt(document.getElementById('harmonics').value);
  const speedVal = parseInt(document.getElementById('speed').value);
  const trailLen = parseInt(document.getElementById('trail').value);

  document.getElementById('harmonicsVal').textContent = maxN;
  document.getElementById('speedVal').textContent = speedVal;
  document.getElementById('trailVal').textContent = trailLen;

  const coeffs = fullCoeffs.slice(0, maxN);
  document.getElementById('infoCircles').textContent = coeffs.length;

  ctx.clearRect(0, 0, W, H);

  // Draw original shape faintly
  if (drawnPoints.length > 1) {
    ctx.strokeStyle = c.drawn;
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.15;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(drawnPoints[0].x, drawnPoints[0].y);
    for (let i = 1; i < drawnPoints.length; i++) {
      ctx.lineTo(drawnPoints[i].x, drawnPoints[i].y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.globalAlpha = 1;
  }

  const dt = speedVal * 0.0003;
  const t = animTime;
  const cx = fourierCenter.x;
  const cy = fourierCenter.y;

  // Epicycles
  let x = cx, y = cy;
  for (let i = 0; i < coeffs.length; i++) {
    const coeff = coeffs[i];
    const prevX = x, prevY = y;
    const angle = coeff.freq * t * 2 * Math.PI + coeff.phase;
    x += coeff.amp * Math.cos(angle);
    y += coeff.amp * Math.sin(angle);

    if (coeff.amp > 0.5) {
      // Circle
      ctx.beginPath();
      ctx.arc(prevX, prevY, coeff.amp, 0, 2 * Math.PI);
      ctx.strokeStyle = c.circle;
      ctx.lineWidth = 0.7;
      ctx.stroke();

      // Radius line
      ctx.beginPath();
      ctx.moveTo(prevX, prevY);
      ctx.lineTo(x, y);
      ctx.strokeStyle = i < 3 ? c.accent : c.fg2;
      ctx.globalAlpha = i < 3 ? 0.5 : 0.18;
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }

  // Tip dot
  ctx.beginPath();
  ctx.arc(x, y, 2.5, 0, 2 * Math.PI);
  ctx.fillStyle = c.accent;
  ctx.fill();

  // Store trace
  tracePoints.push({ x, y });
  if (tracePoints.length > trailLen) {
    tracePoints = tracePoints.slice(-trailLen);
  }

  // Draw trace
  if (tracePoints.length > 1) {
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    for (let i = 1; i < tracePoints.length; i++) {
      const alpha = (i / tracePoints.length);
      ctx.globalAlpha = alpha * alpha;
      ctx.strokeStyle = c.trace;
      ctx.beginPath();
      ctx.moveTo(tracePoints[i - 1].x, tracePoints[i - 1].y);
      ctx.lineTo(tracePoints[i].x, tracePoints[i].y);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  animTime += dt;
  if (animTime > 1) animTime -= 1;

  animId = requestAnimationFrame(animate);
}

// ==== Slider listeners ====
document.getElementById('harmonics').addEventListener('input', function () {
  document.getElementById('harmonicsVal').textContent = this.value;
});
document.getElementById('speed').addEventListener('input', function () {
  document.getElementById('speedVal').textContent = this.value;
});
document.getElementById('trail').addEventListener('input', function () {
  document.getElementById('trailVal').textContent = this.value;
});

// ==== Status helper ====
function setStatus(html) {
  document.getElementById('statusText').innerHTML = html;
}

// ==== Presets ====
function loadPreset(name) {
  stopAnimation();
  hideContourPreview();
  const N = 256;
  const pts = [];
  for (let i = 0; i < N; i++) {
    const t = (i / N) * 2 * Math.PI;
    let x, y;
    const s = Math.min(W, H) * 0.3;
    switch (name) {
      case 'star': {
        const points = 5;
        const idx = Math.floor(i / N * points * 2);
        const frac = (i / N * points * 2) - idx;
        const a1 = (idx / (points * 2)) * 2 * Math.PI - Math.PI / 2;
        const a2 = ((idx + 1) / (points * 2)) * 2 * Math.PI - Math.PI / 2;
        const r1 = idx % 2 === 0 ? s : s * 0.42;
        const r2 = (idx + 1) % 2 === 0 ? s : s * 0.42;
        x = W / 2 + (r1 * Math.cos(a1) * (1 - frac) + r2 * Math.cos(a2) * frac);
        y = H / 2 + (r1 * Math.sin(a1) * (1 - frac) + r2 * Math.sin(a2) * frac);
        break;
      }
      case 'heart': {
        x = W / 2 + s * 0.8 * 16 * Math.pow(Math.sin(t), 3) / 16;
        y = H / 2 - s * 0.8 * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) / 16;
        break;
      }
      case 'trefoil': {
        const r = s * (0.5 + 0.5 * Math.cos(3 * t));
        x = W / 2 + r * Math.cos(t);
        y = H / 2 + r * Math.sin(t);
        break;
      }
      case 'square': {
        const side = s * 1.4;
        const perim = 4 * side;
        const d = (t / (2 * Math.PI)) * perim;
        if (d < side) { x = W / 2 - side / 2 + d; y = H / 2 - side / 2; }
        else if (d < 2 * side) { x = W / 2 + side / 2; y = H / 2 - side / 2 + (d - side); }
        else if (d < 3 * side) { x = W / 2 + side / 2 - (d - 2 * side); y = H / 2 + side / 2; }
        else { x = W / 2 - side / 2; y = H / 2 + side / 2 - (d - 3 * side); }
        break;
      }
      case 'figure8': {
        x = W / 2 + s * Math.sin(t);
        y = H / 2 + s * 0.6 * Math.sin(2 * t);
        break;
      }
      case 'spiral': {
        const r2 = s * (0.15 + 0.85 * (t / (2 * Math.PI)));
        x = W / 2 + r2 * Math.cos(t * 3);
        y = H / 2 + r2 * Math.sin(t * 3);
        break;
      }
      case 'butterfly': {
        const r2 = s * 0.7 * (Math.exp(Math.cos(t)) - 2 * Math.cos(4 * t) - Math.pow(Math.sin(t / 12), 5));
        x = W / 2 + r2 * Math.sin(t) * 0.35;
        y = H / 2 - r2 * Math.cos(t) * 0.35;
        break;
      }
    }
    pts.push({ x, y });
  }
  drawnPoints = pts;
  hint.classList.add('hidden');
  processPoints(drawnPoints);
}

// ================================================================
// ==== IMAGE UPLOAD -> EDGE DETECTION -> CONTOUR -> EPICYCLES ====
// ================================================================

document.getElementById('imageUpload').addEventListener('change', function (e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function (ev) {
    const img = new Image();
    img.onload = function () {
      setStatus('Processing image...');
      hint.classList.add('hidden');
      // Use setTimeout to let the status text render
      setTimeout(() => processImage(img), 50);
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
  // Reset so same file can be re-uploaded
  this.value = '';
});

function processImage(img) {
  // Scale image to manageable size
  const MAX_DIM = 400;
  let iw = img.width, ih = img.height;
  if (iw > MAX_DIM || ih > MAX_DIM) {
    const scale = MAX_DIM / Math.max(iw, ih);
    iw = Math.round(iw * scale);
    ih = Math.round(ih * scale);
  }

  // Hidden canvas for processing
  const offscreen = document.createElement('canvas');
  offscreen.width = iw;
  offscreen.height = ih;
  const octx = offscreen.getContext('2d');
  octx.drawImage(img, 0, 0, iw, ih);

  const imageData = octx.getImageData(0, 0, iw, ih);
  const pixels = imageData.data;

  // 1. Grayscale
  const gray = new Float32Array(iw * ih);
  for (let i = 0; i < iw * ih; i++) {
    const r = pixels[i * 4];
    const g = pixels[i * 4 + 1];
    const b = pixels[i * 4 + 2];
    gray[i] = 0.299 * r + 0.587 * g + 0.114 * b;
  }

  // 2. Gaussian blur (3x3)
  const blurred = gaussianBlur3x3(gray, iw, ih);

  // 3. Sobel edge detection
  const edges = sobelFilter(blurred, iw, ih);

  // 4. Threshold (Otsu-like)
  const threshold = otsuThreshold(edges, iw, ih);
  const binary = new Uint8Array(iw * ih);
  for (let i = 0; i < iw * ih; i++) {
    binary[i] = edges[i] > threshold ? 1 : 0;
  }

  // 5. Collect edge pixels
  const edgePixels = [];
  for (let y = 0; y < ih; y++) {
    for (let x = 0; x < iw; x++) {
      if (binary[y * iw + x]) {
        edgePixels.push({ x, y });
      }
    }
  }

  if (edgePixels.length < 20) {
    setStatus('Not enough edges found -- try a different image');
    return;
  }

  // 6. Order into contour via nearest-neighbor
  const contour = orderContour(edgePixels);

  // 7. Resample to 512 points
  const resampled = resample(contour, 512);

  // 8. Scale contour to fit canvas
  let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
  for (const p of resampled) {
    if (p.x < minX) minX = p.x;
    if (p.x > maxX) maxX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.y > maxY) maxY = p.y;
  }
  const cw = maxX - minX || 1;
  const ch = maxY - minY || 1;
  const padding = 0.15;
  const availW = W * (1 - 2 * padding);
  const availH = H * (1 - 2 * padding);
  const scale = Math.min(availW / cw, availH / ch);
  const offsetX = W / 2 - (minX + cw / 2) * scale;
  const offsetY = H / 2 - (minY + ch / 2) * scale;

  const scaledPoints = resampled.map(p => ({
    x: p.x * scale + offsetX,
    y: p.y * scale + offsetY,
  }));

  // Show contour preview
  showContourPreview(contour, iw, ih);

  // Feed to the DFT pipeline
  drawnPoints = scaledPoints;
  processPoints(drawnPoints);
  setStatus('Animating image contour');
}

// ==== Gaussian blur 3x3 ====
function gaussianBlur3x3(src, w, h) {
  const kernel = [1, 2, 1, 2, 4, 2, 1, 2, 1];
  const ksum = 16;
  const out = new Float32Array(w * h);
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      let val = 0;
      let ki = 0;
      for (let dy = -1; dy <= 1; dy++) {
        for (let dx = -1; dx <= 1; dx++) {
          val += src[(y + dy) * w + (x + dx)] * kernel[ki++];
        }
      }
      out[y * w + x] = val / ksum;
    }
  }
  // Copy edges
  for (let x = 0; x < w; x++) { out[x] = src[x]; out[(h - 1) * w + x] = src[(h - 1) * w + x]; }
  for (let y = 0; y < h; y++) { out[y * w] = src[y * w]; out[y * w + w - 1] = src[y * w + w - 1]; }
  return out;
}

// ==== Sobel filter ====
function sobelFilter(src, w, h) {
  const mag = new Float32Array(w * h);
  for (let y = 1; y < h - 1; y++) {
    for (let x = 1; x < w - 1; x++) {
      const tl = src[(y - 1) * w + (x - 1)];
      const tc = src[(y - 1) * w + x];
      const tr = src[(y - 1) * w + (x + 1)];
      const ml = src[y * w + (x - 1)];
      const mr = src[y * w + (x + 1)];
      const bl = src[(y + 1) * w + (x - 1)];
      const bc = src[(y + 1) * w + x];
      const br = src[(y + 1) * w + (x + 1)];
      const gx = -tl - 2 * ml - bl + tr + 2 * mr + br;
      const gy = -tl - 2 * tc - tr + bl + 2 * bc + br;
      mag[y * w + x] = Math.sqrt(gx * gx + gy * gy);
    }
  }
  return mag;
}

// ==== Otsu threshold ====
function otsuThreshold(data, w, h) {
  // Build histogram of edge magnitudes (quantized to 256 bins)
  let maxVal = 0;
  for (let i = 0; i < data.length; i++) {
    if (data[i] > maxVal) maxVal = data[i];
  }
  if (maxVal === 0) return 0;

  const bins = 256;
  const hist = new Float64Array(bins);
  for (let i = 0; i < data.length; i++) {
    const bin = Math.min(Math.floor(data[i] / maxVal * (bins - 1)), bins - 1);
    hist[bin]++;
  }

  const total = data.length;
  let sumAll = 0;
  for (let i = 0; i < bins; i++) sumAll += i * hist[i];

  let sumBg = 0, wBg = 0;
  let bestThresh = 0, bestVar = 0;

  for (let i = 0; i < bins; i++) {
    wBg += hist[i];
    if (wBg === 0) continue;
    const wFg = total - wBg;
    if (wFg === 0) break;
    sumBg += i * hist[i];
    const meanBg = sumBg / wBg;
    const meanFg = (sumAll - sumBg) / wFg;
    const diff = meanBg - meanFg;
    const variance = wBg * wFg * diff * diff;
    if (variance > bestVar) {
      bestVar = variance;
      bestThresh = i;
    }
  }

  return (bestThresh / (bins - 1)) * maxVal;
}

// ==== Order edge pixels into a contour (nearest-neighbor greedy) ====
function orderContour(pixels) {
  if (pixels.length === 0) return [];

  // Use a grid-based spatial index for fast nearest neighbor
  const gridSize = 4;
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  for (const p of pixels) {
    if (p.x < minX) minX = p.x;
    if (p.y < minY) minY = p.y;
    if (p.x > maxX) maxX = p.x;
    if (p.y > maxY) maxY = p.y;
  }
  const gw = Math.ceil((maxX - minX + 1) / gridSize) + 1;
  const gh = Math.ceil((maxY - minY + 1) / gridSize) + 1;
  const grid = new Array(gw * gh);
  for (let i = 0; i < grid.length; i++) grid[i] = [];

  const used = new Uint8Array(pixels.length);
  for (let i = 0; i < pixels.length; i++) {
    const gx = Math.floor((pixels[i].x - minX) / gridSize);
    const gy = Math.floor((pixels[i].y - minY) / gridSize);
    grid[gy * gw + gx].push(i);
  }

  const ordered = [];
  let currentIdx = 0;
  ordered.push(pixels[0]);
  used[0] = 1;

  for (let step = 1; step < pixels.length; step++) {
    const cur = pixels[currentIdx];
    const cgx = Math.floor((cur.x - minX) / gridSize);
    const cgy = Math.floor((cur.y - minY) / gridSize);

    let bestDist = Infinity;
    let bestIdx = -1;

    // Search expanding rings of grid cells
    for (let radius = 0; radius <= Math.max(gw, gh); radius++) {
      if (bestDist <= (radius - 1) * (radius - 1) * gridSize * gridSize && bestIdx !== -1) break;

      for (let dy = -radius; dy <= radius; dy++) {
        for (let dx = -radius; dx <= radius; dx++) {
          if (Math.abs(dx) !== radius && Math.abs(dy) !== radius) continue; // only ring border
          const nx = cgx + dx, ny = cgy + dy;
          if (nx < 0 || ny < 0 || nx >= gw || ny >= gh) continue;
          const cell = grid[ny * gw + nx];
          for (let j = 0; j < cell.length; j++) {
            const idx = cell[j];
            if (used[idx]) continue;
            const p = pixels[idx];
            const ddx = p.x - cur.x;
            const ddy = p.y - cur.y;
            const dist = ddx * ddx + ddy * ddy;
            if (dist < bestDist) {
              bestDist = dist;
              bestIdx = idx;
            }
          }
        }
      }
      // If found a neighbor within this ring's potential range, we can stop
      if (bestIdx !== -1 && bestDist <= (radius + 1) * (radius + 1) * gridSize * gridSize) break;
    }

    if (bestIdx === -1) break;
    ordered.push(pixels[bestIdx]);
    used[bestIdx] = 1;
    currentIdx = bestIdx;
  }

  return ordered;
}

// ==== Contour preview ====
function showContourPreview(contour, iw, ih) {
  const preview = document.getElementById('contourPreview');
  const pcanvas = document.getElementById('previewCanvas');
  const pctx = pcanvas.getContext('2d');
  preview.style.display = 'block';

  const size = 80;
  pcanvas.width = size;
  pcanvas.height = size;

  const c = themeColors();
  pctx.fillStyle = c.bg === '#111' ? '#1a1a1a' : '#eaeae5';
  pctx.fillRect(0, 0, size, size);

  // Scale contour to fit preview
  const scale = (size - 8) / Math.max(iw, ih);
  const offX = (size - iw * scale) / 2;
  const offY = (size - ih * scale) / 2;

  pctx.fillStyle = c.accent;
  for (const p of contour) {
    pctx.fillRect(
      Math.round(p.x * scale + offX),
      Math.round(p.y * scale + offY),
      1, 1
    );
  }
}

function hideContourPreview() {
  document.getElementById('contourPreview').style.display = 'none';
}

// ==== Init ====
setTimeout(() => loadPreset('heart'), 200);
</script>
